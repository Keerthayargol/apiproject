<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Mini Project</title>

    <link rel="stylesheet" href="style.css">

 
</head>

<body>

<div class="container">

    <h1>🐱 Cat Facts & 🐶 Dog Images</h1>

    <!-- Cat Fact -->
    <div class="card">
        <h2>Random Cat Fact</h2>

        <button id="btn1">Show New Fact</button>

        <p id="fact"></p>
    </div>


    <!-- Dog Image -->
    <div class="card">
        <h2>Random Dog Image</h2>

        <button id="dog">Show Dog Image</button>

        <img id="result" src="" alt="Dog Image">
    </div>


    <!-- University Search -->
    <div class="card">

        <h2>Search Universities</h2>

        <input id="country" placeholder="Enter country name">

        <button id="btn4">Search</button>

        <ul></ul>

    </div>


</div>
<script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>

<script src="app.js"></script>

</body>
</html>
